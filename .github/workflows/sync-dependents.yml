name: Sync to dependent repos

# Publishes build artifacts to repos that depend on them:
#  - Portfolio (Vercel-deployed at joavn.dev): the built HTML pages, served at joavn.dev/mpi.
#  - Versed: the full scored CSV, which its server reads as a data file.
# Mirrors the same pattern CHORIDOR-web uses.
# Requires repo secrets:
#  - PORTFOLIO_TOKEN: a PAT with write access to JoachimVN/Portfolio.
#  - VERSED_TOKEN: a PAT with write access to JoachimVN/Versed.

on:
  push:
    branches: [main]
    paths:
      - 'output/index.html'
      - 'output/billboard.html'
      - 'output/music_index_full.csv'
  workflow_dispatch:

jobs:
  sync-portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone portfolio repo
        env:
          PORTFOLIO_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
        run: git clone "https://x-access-token:${PORTFOLIO_TOKEN}@github.com/JoachimVN/Portfolio.git" portfolio

      - name: Sync built pages -> mpi/
        run: |
          rm -rf portfolio/mpi
          mkdir -p portfolio/mpi
          cp output/index.html portfolio/mpi/index.html
          cp output/billboard.html portfolio/mpi/billboard.html

      - name: Commit and push
        run: |
          cd portfolio
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mpi/
          git diff --staged --quiet || git commit -m "chore: sync MPI from Music-Popularity-Index@${{ github.sha }}"
          git push

  sync-versed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Versed repo
        env:
          VERSED_TOKEN: ${{ secrets.VERSED_TOKEN }}
        run: git clone --branch dev "https://x-access-token:${VERSED_TOKEN}@github.com/JoachimVN/Versed.git" versed

      - name: Sync scored CSV -> server/src/data/
        run: |
          mkdir -p versed/server/src/data
          cp output/music_index_full.csv versed/server/src/data/music_index_full.csv

      - name: Commit and push
        run: |
          cd versed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/src/data/music_index_full.csv
          git diff --staged --quiet || git commit -m "chore: sync music_index_full.csv from Music-Popularity-Index@${{ github.sha }}"
          git push
